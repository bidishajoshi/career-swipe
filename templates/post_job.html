{% extends "base.html" %}
{% block title %}Post a Job – CareerSwipe{% endblock %}
{% block content %}
<div class="auth-wrap company-theme">
  <div class="auth-card">
    <div class="auth-header company-header">
      <span class="role-badge badge-company"> </span>
      <h2>Post a job listing</h2>
      <p>Reach qualified candidates instantly</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="field">
        <label>Job title</label>
        <input type="text" name="title" required placeholder=" ">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Location</label>
          <input type="text" name="location" placeholder="Kathmandu / Remote">
        </div>
        <div class="field">
          <label>Job type</label>
          <select name="job_type">
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>
            <option>Internship</option>
            <option>Remote</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Experience level</label>
          <select name="experience_level">
            <option>Entry Level</option>
            <option>Mid Level</option>
            <option>Senior Level</option>
            <option>Expert</option>
          </select>
        </div>
        <div class="field">
          <label>Min Experience (years)</label>
          <input type="number" name="min_experience" value="0">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Salary Display</label>
          <input type="text" name="salary" placeholder="e.g. NPR 60,000">
        </div>
        <div class="field">
          <label>Max Salary (Numerical)</label>
          <input type="number" name="max_salary" placeholder="e.g. 90000">
        </div>
      </div>
      <div class="field">
        <label>Location Type</label>
        <select name="job_location_type">
          <option>Onsite</option>
          <option>Remote</option>
          <option>Hybrid</option>
        </select>
      </div>
      <div class="field">
        <label>Tags (Skills, comma separated)</label>
        <input type="text" name="tags" placeholder="Python, Flask, AI">
      </div>
      <div class="field">
        <label>Job description</label>
        <textarea name="description" rows="5" required placeholder="Describe the role, responsibilities, and company culture..."></textarea>
      </div>
      <div class="field">
        <label>Required skills (comma-separated)</label>
        <input type="text" name="required_skills" placeholder=" ">
      </div>
      <button type="submit" class="btn btn-company btn-full">Post Job →</button>
      <p class="auth-link"><a href="{{ url_for('company_dashboard') }}" class="company-link">← Back to dashboard</a></p>
    </form>
  </div>
</div>
{% endblock %}
