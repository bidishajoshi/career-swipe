{% extends "base.html" %}
{% block title %}Error – CareerSwipe{% endblock %}
{% block content %}
<div style="
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:4rem 2rem; text-align:center;
">
  <div>
    <div style="font-size:4rem;margin-bottom:1rem">⚠️</div>
    <h1 style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;
               margin-bottom:1rem;color:var(--text)">
      Something went wrong
    </h1>
    <p style="color:var(--text-muted);font-size:15px;margin-bottom:2rem;max-width:420px;margin:0 auto 2rem">
      {{ error or "An unexpected error occurred. Please try again." }}
    </p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">← Back to Home</a>
  </div>
</div>
{% endblock %}
