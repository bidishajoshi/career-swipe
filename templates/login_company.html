{% extends "base.html" %}
{% block title %}Company Login – CareerSwipe{% endblock %}
{% block content %}
<div class="auth-wrap company-theme">
  <div class="auth-card" style="max-width:440px">

    <div class="auth-header company-header">
      <span class="role-badge badge-company">🏢 Recruiter</span>
      <h2>Company sign in</h2>
      <p>Access your dashboard to manage jobs and applicants</p>
    </div>

    <form method="POST" class="auth-form" id="loginCompanyForm">
      <div class="field">
        <label for="co-email">Official email</label>
        <input type="email" id="co-email" name="email" required autofocus
               placeholder="hr@company.com">
      </div>
      <div class="field">
        <label for="co-password">Password</label>
        <input type="password" id="co-password" name="password" required
               placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-company btn-full" style="margin-top:0.5rem;">
        Sign In →
      </button>
      <p class="auth-link">
        New company?
        <a href="{{ url_for('register_company') }}" style="color:var(--accent);">Register here</a>
      </p>
      <p class="auth-link" style="margin-top:0.5rem;">
        Job seeker?
        <a href="{{ url_for('login_seeker') }}">Seeker Login</a>
      </p>
    </form>

  </div>
</div>
{% endblock %}
